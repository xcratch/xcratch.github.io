name: Start Site

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Checkout reference of Xcratch"
        default: "xcratch.github.io"
        required: true
      dev:
        description: "Publish for development"
        type: boolean
        default: true
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  SCRATCH_EDITOR_DIR: ./scratch-editor
  XCRATCH_IO_DIR: ./xcratch.github.io
  XCRATCH_DOC_DIR: ./xcratch-doc
  PUBLIC_DIR: ./public

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    
    steps:
      # デバッグ: 入力パラメータの表示
      - name: Display workflow inputs
        run: echo "${{ toJSON(inputs) }}"
      
      # リポジトリのチェックアウト
      - name: Checkout scratch-editor
        uses: actions/checkout@v4
        with:
          repository: xcratch/scratch-editor
          ref: ${{ inputs.checkout_ref }}
          path: ${{ env.SCRATCH_EDITOR_DIR }}
      
      - name: Checkout xcratch.github.io
        uses: actions/checkout@v4
        with:
          repository: xcratch/xcratch.github.io
          path: ${{ env.XCRATCH_IO_DIR }}
      
      - name: Checkout xcratch-doc
        uses: actions/checkout@v4
        with:
          repository: xcratch/xcratch-doc
          path: ${{ env.XCRATCH_DOC_DIR }}
      
      # Node.js環境のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ env.SCRATCH_EDITOR_DIR }}/.nvmrc
      
      # システムライブラリの依存関係のインストール
      - name: Install system library dependencies
        run: |
          echo "Using pkg-config $(pkg-config --version)"
          # These dependencies are from scratch-paint -> paper.js -> canvas
          # See also `util/has_lib.js` in the `canvas` package
          # There must be a better way to detect gif_lib.h than this...
          missing_libraries="$(
            ldconfig -p | grep -q 'libcairo\.so' || echo libcairo2-dev
            pkg-config pangocairo || echo libpango1.0-dev
            pkg-config libssl || echo libssl-dev
            pkg-config libjpeg || echo libjpeg-dev
            test -f /usr/include/gif_lib.h || echo libgif-dev
          )"
          echo "Missing libraries: [$missing_libraries]"
          if [ -n "$missing_libraries" ]; then
            sudo apt update # avoiding this is the main reason for detecting missing libraries
            sudo apt install -y $missing_libraries
          else
            echo "No missing libraries"
          fi
      
      # 依存関係のインストール
      - name: Install NPM dependencies (no cache)
        working-directory: ${{ env.SCRATCH_EDITOR_DIR }}
        run: NODE_ENV=development npm ci
      
      # ビルド準備
      - name: Setup preload configuration
        run: |
          cp ${{ env.XCRATCH_IO_DIR }}/scripts/preload-rules.json ${{ env.SCRATCH_EDITOR_DIR }}/packages/scratch-gui/scripts/preload-rules.json
          cd ${{ env.SCRATCH_EDITOR_DIR }}/packages/scratch-gui
          npm run preload
      
      # ビルド実行
      - name: Build packages
        working-directory: ${{ env.SCRATCH_EDITOR_DIR }}
        run: npm run build
      
      # 公開ディレクトリの構築
      - name: Copy favicon
        run: cp ${{ env.XCRATCH_IO_DIR }}/editor/favicon.ico ${{ env.SCRATCH_EDITOR_DIR }}/packages/scratch-gui/build/static/favicon.ico
      
      - name: Setup public directory
        run: mv -T ${{ env.XCRATCH_IO_DIR }}/public ${{ env.PUBLIC_DIR }}
      
      - name: Move editor files
        run: mv -T ${{ env.SCRATCH_EDITOR_DIR }}/packages/scratch-gui/build ${{ env.PUBLIC_DIR }}/editor
      
      - name: Move documentation files
        run: mv -T ${{ env.XCRATCH_DOC_DIR }}/docs ${{ env.PUBLIC_DIR }}/docs

      - name: Checkout pages-state branch
        uses: actions/checkout@v4
        with:
          repository: xcratch/xcratch.github.io
          ref: pages-state
          path: ./temp-gh-pages
        continue-on-error: true

      - name: Preserve dev directory
        if: ${{ !inputs.dev }}
        run: |
          if [ -d "./temp-gh-pages/dev" ]; then
            echo "Preserving dev directory from pages-state..."
            cp -r ./temp-gh-pages/dev ${{ env.PUBLIC_DIR }}/dev
          else
            echo "No dev directory found in pages-state."
          fi

      - name: Prepare dev deployment with root content preservation
        if: ${{ inputs.dev }}
        run: |
          # Move the dev build to runner temp (auto-cleaned after workflow)
          TEMP_DEV=$RUNNER_TEMP/dev-build
          mkdir -p $TEMP_DEV
          cp -rT ${{ env.PUBLIC_DIR }} $TEMP_DEV
          rm -rf ${{ env.PUBLIC_DIR }}
          mkdir -p ${{ env.PUBLIC_DIR }}

          # Copy root content from current pages-state (excluding dev/ to replace it)
          if [ -d "./temp-gh-pages" ]; then
            find ./temp-gh-pages -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'dev' \
              -exec cp -r {} ${{ env.PUBLIC_DIR }}/ \;
          fi

          # Put the new dev build at dev/
          mv $TEMP_DEV ${{ env.PUBLIC_DIR }}/dev

      # Save state for future deployments
      - name: Save deployment state to pages-state branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PUBLIC_DIR }}
          publish_branch: pages-state
          keep_files: false
          force_orphan: true

      # Deploy directly to GitHub Pages via Actions
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLIC_DIR }}

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
